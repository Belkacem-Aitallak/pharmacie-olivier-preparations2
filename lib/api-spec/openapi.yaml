openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Pharmacie l'Olivier - Gestion des Préparations Magistrales API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: components
    description: Predefined components
  - name: preparations
    description: Magistral preparations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /components:
    get:
      operationId: listComponents
      tags: [components]
      summary: List all predefined components
      responses:
        "200":
          description: List of components
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Component"

  /preparations:
    get:
      operationId: listPreparations
      tags: [preparations]
      summary: List all preparations
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Search by patient name or doctor name
      responses:
        "200":
          description: List of preparations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PreparationSummary"
    post:
      operationId: createPreparation
      tags: [preparations]
      summary: Create a new preparation
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CreatePreparationForm"
      responses:
        "201":
          description: Created preparation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Preparation"

  /preparations/{id}:
    get:
      operationId: getPreparation
      tags: [preparations]
      summary: Get a preparation by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Preparation details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Preparation"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updatePreparation
      tags: [preparations]
      summary: Update preparation status and/or note
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePreparationBody"
      responses:
        "200":
          description: Updated preparation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Preparation"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Component:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        unitType:
          type: string
          enum: [g, ml, unit]
        pricePerUnit:
          type: number
      required:
        - id
        - name
        - unitType
        - pricePerUnit

    PreparationComponent:
      type: object
      properties:
        id:
          type: integer
        componentId:
          type: integer
        componentName:
          type: string
        unitType:
          type: string
        pricePerUnit:
          type: number
        quantity:
          type: number
        componentTotal:
          type: number
      required:
        - id
        - componentId
        - componentName
        - unitType
        - pricePerUnit
        - quantity
        - componentTotal

    PreparationSummary:
      type: object
      properties:
        id:
          type: integer
        patientName:
          type: string
        phoneNumber:
          type: string
        doctorName:
          type: string
        preparatorName:
          type: string
        status:
          type: string
        note:
          type: string
        totalPrice:
          type: number
        dateCreated:
          type: string
        compositionSummary:
          type: string
      required:
        - id
        - patientName
        - phoneNumber
        - doctorName
        - preparatorName
        - status
        - totalPrice
        - dateCreated
        - compositionSummary

    Preparation:
      type: object
      properties:
        id:
          type: integer
        patientName:
          type: string
        phoneNumber:
          type: string
        doctorName:
          type: string
        preparatorName:
          type: string
        status:
          type: string
        note:
          type: string
        prescriptionImage:
          type: string
          nullable: true
        totalPrice:
          type: number
        dateCreated:
          type: string
        components:
          type: array
          items:
            $ref: "#/components/schemas/PreparationComponent"
      required:
        - id
        - patientName
        - phoneNumber
        - doctorName
        - preparatorName
        - status
        - totalPrice
        - dateCreated
        - components

    CreatePreparationForm:
      type: object
      properties:
        patientName:
          type: string
        phoneNumber:
          type: string
        doctorName:
          type: string
        preparatorName:
          type: string
        status:
          type: string
        note:
          type: string
        prescriptionImage:
          type: string
          format: binary
        components:
          type: string
          description: JSON array of {componentId, quantity}
      required:
        - patientName
        - phoneNumber
        - doctorName
        - preparatorName
        - status
        - components

    UpdatePreparationBody:
      type: object
      properties:
        status:
          type: string
        note:
          type: string
